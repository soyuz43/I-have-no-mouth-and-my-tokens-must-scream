name: Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run strategy extraction tests
        run: node js/tests/strategyExtractionRegression.test.mjs --json

      - name: Run scratchpad comms tests
        run: node js/tests/scratchpadCommsRepair.test.js --json